<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>銀行明細取込 | AI経理社員</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <nav id="sidebar" class="sidebar"></nav>
    <main class="main-content">
      <header id="header" class="header"></header>
      <div class="content">
        <h2 class="page-title">銀行明細CSVインポート</h2>

        <!-- 対応銀行 -->
        <div class="card mb-24">
          <div class="card-header">対応銀行</div>
          <div class="card-body">
            <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;">
              <div style="text-align:center;padding:12px 20px;background:var(--gray-50);border-radius:8px;min-width:120px;">
                <div style="font-size:1.5rem;margin-bottom:4px;">🏦</div>
                <div style="font-size:0.85rem;font-weight:600;">みずほ銀行</div>
              </div>
              <div style="text-align:center;padding:12px 20px;background:var(--gray-50);border-radius:8px;min-width:120px;">
                <div style="font-size:1.5rem;margin-bottom:4px;">🏦</div>
                <div style="font-size:0.85rem;font-weight:600;">三菱UFJ銀行</div>
              </div>
              <div style="text-align:center;padding:12px 20px;background:var(--gray-50);border-radius:8px;min-width:120px;">
                <div style="font-size:1.5rem;margin-bottom:4px;">🏦</div>
                <div style="font-size:0.85rem;font-weight:600;">三井住友銀行</div>
              </div>
              <div style="text-align:center;padding:12px 20px;background:var(--gray-50);border-radius:8px;min-width:120px;">
                <div style="font-size:1.5rem;margin-bottom:4px;">🏣</div>
                <div style="font-size:0.85rem;font-weight:600;">ゆうちょ銀行</div>
              </div>
            </div>
          </div>
        </div>

        <!-- ドロップゾーン -->
        <div class="card">
          <div class="card-body">
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
              <div class="drop-icon">📁</div>
              <div class="drop-text">CSVファイルをドラッグ＆ドロップ</div>
              <div class="drop-sub">またはクリックしてファイルを選択</div>
              <input type="file" id="fileInput" accept=".csv" style="display:none;" onchange="handleFile()">
            </div>

            <div id="fileInfo" style="display:none;margin-top:16px;">
              <div class="alert alert-info">
                <span>📄</span>
                <div>
                  <strong id="fileName">mizuho_202603.csv</strong>
                  <span style="color:var(--gray-600);font-size:0.85rem;"> - 10件の取引データ</span>
                </div>
              </div>
            </div>

            <div class="btn-group mt-24" style="justify-content:center;">
              <button class="btn btn-primary btn-lg" id="importBtn" onclick="startImport()" disabled>インポート実行</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/common.js"></script>
  <script>
    initLayout('bank-import', '銀行明細取込');

    const dropZone = document.getElementById('dropZone');

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFile();
    });

    function handleFile() {
      document.getElementById('fileInfo').style.display = 'block';
      document.getElementById('importBtn').disabled = false;
      dropZone.innerHTML = `
        <div class="drop-icon" style="color:var(--green);">✓</div>
        <div class="drop-text" style="color:var(--green);">ファイル選択済み</div>
        <div class="drop-sub">mizuho_202603.csv</div>`;
    }

    function startImport() {
      showToast('CSVインポートを開始します...');
      setTimeout(() => {
        window.location.href = 'bank-summary.html';
      }, 1000);
    }
  </script>
</body>
</html>
