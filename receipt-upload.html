<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>領収書アップロード | AI経理社員</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <nav id="sidebar" class="sidebar"></nav>
    <main class="main-content">
      <header id="header" class="header"></header>
      <div class="content">
        <h2 class="page-title">領収書アップロード</h2>

        <!-- アップロードエリア -->
        <div class="receipt-upload-area" id="uploadArea">
          <div class="camera-btn" onclick="document.getElementById('receiptInput').click()">
            <div class="camera-icon">📷</div>
            <div class="camera-text">領収書を撮影する</div>
          </div>
          <input type="file" id="receiptInput" accept="image/*" capture="environment" style="display:none;" onchange="showRecognition()">
          <p style="color:var(--gray-400);font-size:0.9rem;">またはファイルを選択してアップロード</p>
          <button class="btn btn-outline mt-16" onclick="document.getElementById('receiptInput').click()">📁 ファイルを選択</button>
        </div>

        <!-- AI認識結果（初期非表示） -->
        <div id="recognitionResult" style="display:none;">
          <div class="alert alert-success">
            ✓ 領収書の読み取りが完了しました
          </div>

          <div class="recognition-result" style="max-width:500px;margin:0 auto;">
            <div class="result-title">AI認識結果</div>
            <div class="result-item">
              <span class="label">日付</span>
              <span>2026年3月18日</span>
            </div>
            <div class="result-item">
              <span class="label">金額</span>
              <span class="amount" style="color:var(--navy);">¥11,880</span>
            </div>
            <div class="result-item">
              <span class="label">支払先</span>
              <span>JR東日本</span>
            </div>
            <div class="result-item">
              <span class="label">内容</span>
              <span>東京→名古屋 新幹線</span>
            </div>
            <div class="result-item">
              <span class="label">勘定科目</span>
              <span><span class="badge badge-blue">自動判定</span> 旅費交通費</span>
            </div>
            <div class="result-item" style="border-bottom:none;">
              <span class="label">税区分</span>
              <span>課税仕入（10%）</span>
            </div>
          </div>

          <div class="btn-group mt-24" style="justify-content:center;">
            <button class="btn btn-primary btn-lg" onclick="showToast('経費を計上しました。仕訳を自動登録しました。')">このまま計上する</button>
            <button class="btn btn-outline btn-lg" onclick="showToast('修正画面を開きます')">修正する</button>
          </div>

          <!-- 登録済み一覧 -->
          <div class="card mt-24" style="max-width:500px;margin:24px auto 0;">
            <div class="card-header">最近アップロードした領収書</div>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>日付</th>
                    <th>支払先</th>
                    <th class="text-right">金額</th>
                    <th>科目</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>3/18</td>
                    <td>JR東日本</td>
                    <td class="text-right amount">¥11,880</td>
                    <td>旅費交通費</td>
                  </tr>
                  <tr>
                    <td>3/15</td>
                    <td>Amazon</td>
                    <td class="text-right amount">¥5,480</td>
                    <td>消耗品費</td>
                  </tr>
                  <tr>
                    <td>3/10</td>
                    <td>スターバックス</td>
                    <td class="text-right amount">¥1,650</td>
                    <td>会議費</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/mock-data.js"></script>
  <script src="js/common.js"></script>
  <script>
    initLayout('receipt-upload', '領収書アップロード');

    function showRecognition() {
      document.getElementById('uploadArea').style.display = 'none';
      document.getElementById('recognitionResult').style.display = 'block';
    }
  </script>
</body>
</html>
